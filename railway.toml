[build]
builder = "nixpacks"

[deploy]
startCommand = "node apps/api/dist/combo-server.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install -g pnpm", "pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter @card-battles/api build:combo"]
