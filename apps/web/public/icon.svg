<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Purple background -->
  <rect width="512" height="512" rx="100" fill="#0a0a0f"/>
  <rect width="512" height="512" rx="100" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c47ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Sword left (pointing top-right) -->
  <g transform="translate(256,256)">
    <!-- Left sword -->
    <g transform="rotate(-45)">
      <rect x="-6" y="-120" width="12" height="160" rx="3" fill="white" opacity="0.95"/>
      <!-- crossguard -->
      <rect x="-28" y="28" width="56" height="10" rx="4" fill="white" opacity="0.85"/>
      <!-- pommel -->
      <ellipse cx="0" cy="55" rx="14" ry="10" fill="white" opacity="0.8"/>
      <!-- tip -->
      <polygon points="-6,-120 6,-120 0,-148" fill="white" opacity="0.95"/>
    </g>
    <!-- Right sword -->
    <g transform="rotate(45)">
      <rect x="-6" y="-120" width="12" height="160" rx="3" fill="#c4b5fd" opacity="0.95"/>
      <!-- crossguard -->
      <rect x="-28" y="28" width="56" height="10" rx="4" fill="#c4b5fd" opacity="0.85"/>
      <!-- pommel -->
      <ellipse cx="0" cy="55" rx="14" ry="10" fill="#c4b5fd" opacity="0.8"/>
      <!-- tip -->
      <polygon points="-6,-120 6,-120 0,-148" fill="#c4b5fd" opacity="0.95"/>
    </g>
    <!-- Center sparkle -->
    <circle cx="0" cy="0" r="10" fill="white" opacity="0.9"/>
    <circle cx="0" cy="0" r="6" fill="#6c47ff"/>
  </g>
</svg>
