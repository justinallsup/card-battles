services:
  - type: web
    name: card-battles-api
    runtime: node
    buildCommand: |
      npm install -g pnpm
      pnpm install --no-frozen-lockfile
      cd apps/api
      npx esbuild src/combo-server.ts --bundle --platform=node --outfile=dist/combo-server.js --external:@electric-sql/pglite --external:pg-native
    startCommand: node apps/api/dist/combo-server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /health
