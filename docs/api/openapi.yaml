  # ── LEADERBOARDS ──────────────────────────────────────────────────────────────

  /leaderboards:
    get:
      summary: Get leaderboard
      tags: [Leaderboards]
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [creators, voters]
            default: creators
        - in: query
          name: period
          schema:
            type: string
            enum: [day, week, month, all]
            default: week
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Leaderboard
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  period:
                    type: string
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/LeaderboardItem'

  # ── DAILY PICKS ───────────────────────────────────────────────────────────────

  /daily-picks/current:
    get:
      summary: Get today's daily pick contests
      tags: [Daily Picks]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current daily picks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DailyPick'

  /daily-picks/{id}/enter:
    post:
      summary: Enter a daily pick contest
      tags: [Daily Picks]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [choice]
              properties:
                choice:
                  type: string
                  enum: [left, right]
      responses:
        '201':
          description: Entry submitted
        '400':
          description: Invalid choice
        '401':
          description: Not authenticated
        '409':
          description: Already entered

  /daily-picks/{id}/results:
    get:
      summary: Get daily pick results
      tags: [Daily Picks]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Daily pick results
          content:
            application/json:
              schema:
                type: object
                properties:
                  pickId:
                    type: string
                  leftPercent:
                    type: number
                  rightPercent:
                    type: number
                  totalVotes:
                    type: integer

